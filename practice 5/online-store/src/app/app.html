<section class="page">
  <header class="header">
    <div class="brand">
      <div class="logo" aria-hidden="true">OS</div>
      <div class="titles">
        <h1>Online Store</h1>
        <p>Каталог событий и билетов (демо)</p>
      </div>
    </div>
  </header>

  <section class="section favorites" aria-label="Избранное">
    <div class="section-head">
      <h2>⭐ Избранное</h2>
      <span class="badge" aria-label="Количество в избранном">{{ favorites.length }}</span>
    </div>

    @if (favorites.length === 0) {
      <p class="empty">No favorite products yet</p>
    } @else {
      <app-events-list [events]="favorites" (toggleFavorite)="toggleFavorite($event)" />
    }
  </section>

  <div class="divider" role="separator" aria-hidden="true"></div>

  <section class="section catalog" aria-label="Каталог">
    <div class="section-head">
      <h2>Каталог</h2>
      <span class="badge" aria-label="Количество в каталоге">{{ events.length }}</span>
    </div>

    <app-events-list [events]="events" (toggleFavorite)="toggleFavorite($event)" />
  </section>
</section>
