<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task 2 - Instagram Login</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="page">
    <section class="phone-mockup" aria-label="Instagram app preview">
      <div class="phone-frame">
        <div class="screen">
          <p>Instagram Preview</p>
        </div>
      </div>
    </section>

    <section class="auth" aria-label="Instagram sign in">
      <div class="panel">
        <h1>Instagram</h1>
        <form action="#" method="post" class="login-form">
          <div class="field">
            <label for="ig-username">Phone number, username, or email</label>
            <input id="ig-username" name="username" type="text" autocomplete="username" required>
          </div>

          <div class="field">
            <label for="ig-password">Password</label>
            <input id="ig-password" name="password" type="password" autocomplete="current-password" required>
          </div>

          <button type="submit">Log in</button>
        </form>

        <div class="separator" aria-hidden="true">
          <span></span>
          <strong>OR</strong>
          <span></span>
        </div>

        <a href="#" class="social-login">Log in with Facebook</a>
        <a href="#" class="forgot-link">Forgot password?</a>
      </div>

      <footer class="signup">
        <p>Don't have an account? <a href="#">Sign up</a></p>
      </footer>
    </section>
  </main>
</body>
</html>
